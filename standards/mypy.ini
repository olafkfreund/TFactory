; Factory fleet shared mypy baseline (single source of truth).
; Per-service configs MUST inherit these and may only TIGHTEN.
; See standards/coding-standards.md section 1.2.

[mypy]
python_version = 3.11
strict = True
; strict implies the following; spelled out so the contract is visible and a
; service cannot quietly weaken one of them:
disallow_untyped_defs = True
disallow_any_generics = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
no_implicit_reexport = True
; Boundaries must be typed (section 1.7); surface Any leaks rather than hide them.
disallow_subclassing_any = True
extra_checks = True
