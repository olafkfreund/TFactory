{{- if .Values.externalSecrets.enabled }}
{{- /*
ExternalSecret manifests for the four supported backends. Operators
pick ONE via .Values.externalSecrets.backend; only that block renders.

Each backend produces TWO K8s Secrets (one per security boundary):
  {{ .Values.postgres.externalSecretName }} — DATABASE_URL only.
  {{ .Values.oidc.clientSecretRef.name }}   — OIDC client_secret only.
  tfactory-kms                             — KMS key reference (fernet, etc.)
  tfactory-llm                             — Anthropic API key (P5 surface).
  tfactory-jwt                             — JWT signing secret.

The .refs map in values.yaml is backend-specific addressing (e.g.
Vault path syntax vs AWS SM key/version). Backends share the same
output-shape K8s Secret data keys so the Deployment doesn't care
which backend produced them.
*/}}
---
# DATABASE_URL — produced for every backend.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgres.externalSecretName }}
  labels:
    {{- include "tfactory.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.postgres.externalSecretName }}
    creationPolicy: Owner
  {{- if eq .Values.externalSecrets.backend "vault" }}
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.refs.databaseUrl | quote }}
  {{- else if eq .Values.externalSecrets.backend "aws-sm" }}
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.refs.databaseUrl | quote }}
  {{- else if eq .Values.externalSecrets.backend "azure-kv" }}
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.refs.databaseUrl | quote }}
  {{- else if eq .Values.externalSecrets.backend "gcp-sm" }}
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.refs.databaseUrl | quote }}
  {{- end }}
{{- if .Values.oidc.enabled }}
---
# OIDC client_secret — emitted only when OIDC is enabled.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.oidc.clientSecretRef.name }}
  labels:
    {{- include "tfactory.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.oidc.clientSecretRef.name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.oidc.clientSecretRef.key }}
      remoteRef:
        key: {{ .Values.externalSecrets.refs.oidcClientSecret | quote }}
{{- end }}
{{- if eq .Values.kms.backend "fernet" }}
---
# KMS Fernet key — emitted only when fernet backend is selected.
# Cloud backends authenticate via IRSA / workload identity / managed
# identity, so they don't need a key in K8s Secret form.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.kms.fernetKeyRef.name }}
  labels:
    {{- include "tfactory.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.kms.fernetKeyRef.name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.kms.fernetKeyRef.key }}
      remoteRef:
        key: {{ .Values.externalSecrets.refs.kmsFernetKey | quote }}
{{- end }}
{{- end }}
