<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="color-scheme" content="dark">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/tfactory.css' | relative_url }}">
</head>
<body>
  <div class="bg-mesh" aria-hidden="true">
    <div class="bg-mesh__glow bg-mesh__glow--violet"></div>
    <div class="bg-mesh__glow bg-mesh__glow--cyan"></div>
    <div class="bg-mesh__grid"></div>
  </div>

  <header class="site-header" role="banner">
    <div class="container site-header__inner">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__mark" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <defs>
              <linearGradient id="brand-grad" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
            <path
              d="M4 4h16M12 4v16M5 8h6M5 12h4M5 16h6M13 8h6M13 12h4M13 16h6"
              stroke="url(#brand-grad)"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
        </span>
        <span class="site-brand__name">TFactory</span>
        {%- if site.release_tag -%}
          <a class="site-brand__tag" href="{{ site.release_url }}" rel="noopener">{{ site.release_tag }}</a>
        {%- endif -%}
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/architecture/' | relative_url }}">Architecture</a>
        <a href="{{ '/design-plan/' | relative_url }}">Design</a>
        <a href="{{ '/tasks/' | relative_url }}">Tasks</a>
        <a href="{{ '/progress/' | relative_url }}">Progress</a>
        <a class="site-nav__cta" href="{{ site.repo_url }}" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="site-main" role="main">
    <article class="prose container">
      {{ content }}
    </article>
  </main>

  <script src="{{ '/assets/js/tfactory.js' | relative_url }}" defer></script>

  <footer class="site-footer" role="contentinfo">
    <div class="container site-footer__inner">
      <div>
        <strong>TFactory</strong> ·
        <a href="{{ site.repo_url }}" rel="noopener">GitHub</a> ·
        <a href="{{ site.repo_url }}/blob/main/LICENSE" rel="noopener">MIT OR GPL-3.0</a>
      </div>
      <div class="site-footer__meta">
        Built with Jekyll · Hosted on GitHub Pages
        {%- if site.release_tag -%} · <a href="{{ site.release_url }}" rel="noopener">{{ site.release_tag }}</a>{%- endif -%}
      </div>
    </div>
  </footer>
</body>
</html>
