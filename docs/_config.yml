title: TFactory
description: Autonomous test generation + execution platform — Planner → Gen-Functional → Evaluator → Triager. Hand off a finished feature from AIFactory, Claude Code, or any tool (MCP, or a markdown/Gherkin/EARS file) and get an AI-graded test suite + triage report on your PR.

# Keep the remote theme reference so the legacy Pages auto-builder is happy,
# but override its layout via _layouts/default.html (Jekyll local layouts
# always supersede remote-theme layouts). Our custom CSS loads AFTER
# cayman's so it wins by source order.
remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Blog — posts live under /blog/<year>/<month>/<day>/<title>/
permalink: /blog/:year/:month/:day/:title/
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

show_downloads: false

exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock

# Jekyll ignores dotfiles by default; whitelist the Backstage AI-skills
# discovery endpoint so it is served at /.well-known/skills/.
# See https://backstage.io/docs/ai/skills
include:
  - .well-known

# Repo + version metadata (used by the custom layout)
repo_url: https://github.com/olafkfreund/TFactory
release_tag: v0.1.0-mvp
release_url: https://github.com/olafkfreund/TFactory/releases/tag/v0.1.0-mvp
