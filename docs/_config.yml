title: TFactory
description: Autonomous test generation + execution platform, sister project to AIFactory.
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
show_downloads: false
exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock
