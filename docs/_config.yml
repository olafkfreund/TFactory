title: TFactory
description: Autonomous test generation + execution platform — Planner → Gen-Functional → Evaluator → Triager. Sister project to AIFactory.

# Custom theme — no remote theme. Layout lives in _layouts/, SCSS in assets/css/.
# Both auto-compile via Jekyll's built-in pipeline.

plugins:
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

show_downloads: false

# SCSS pipeline
sass:
  style: compressed

exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock
  - "*.log"

# Repo + version metadata (used by the custom layout)
repo_url: https://github.com/olafkfreund/TFactory
release_tag: v0.1.0-mvp
release_url: https://github.com/olafkfreund/TFactory/releases/tag/v0.1.0-mvp
