[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    asyncio: marks tests as async tests
    docker: marks tests that require Docker on the host (run with '-m docker')
    postgres: marks tests that require a Postgres server (run with '-m postgres')
    secrets: marks tests for the P2 EncryptedString / KMS layer (run with '-m secrets')
    oidc: marks tests for the P3 OIDC SSO layer (run with '-m oidc')
    helm: marks tests for the P4 Helm chart layer (run with '-m helm')
    audit: marks tests for the P5 audit hardening layer (run with '-m audit')
    obs: marks tests for the P6 observability layer (run with '-m obs')
    evidence: marks tests for the P7 evidence / docs / drills layer (run with '-m evidence')
    rmux: marks tests that require a real rmux binary on PATH (Epic #44; auto-skipped when binary is absent — see tests/rmux/conftest.py)
filterwarnings =
    ignore::DeprecationWarning
