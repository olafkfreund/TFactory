# CodeQL advanced-setup config. Runs the default query suite for every rule,
# but swaps the stock py/path-injection for our barrier-aware variant
# (py/path-injection-sanitized) which recognises this repo's sanitizers
# (safe_component / safe_spec_dir / safe_join / os.path.basename /
# get_next_spec_id) so verified-safe code clears organically.
name: "TFactory CodeQL config"
queries:
  - uses: ./.github/codeql/custom-queries
query-filters:
  - exclude:
      id: py/path-injection
