name: ratchet (code-quality)

# Diff-scoped code-quality ratchet (Factory coding-standards section 4.6).
#
# Enforces the shared strict baseline (standards/ruff.toml, vendored from the
# Factory hub at the SHA in standards/PINNED_SHA) as a NO-REGRESSION ratchet on
# the files a PR changes: for every changed backend Python file, the ruff
# violation count at the PR head may not exceed the count on the base branch.
# Touching a legacy hotspot therefore forces it to get cleaner (or at least not
# dirtier); untouched legacy is left alone until someone edits it.
#
# This is intentionally SEPARATE from the existing `backend (ruff + pytest)`
# job: it neither weakens that legacy whole-repo lint nor depends on it, and a
# whole-repo strict gate is deliberately NOT made blocking yet (the legacy
# violation count would make it instantly red). A whole-repo
# `ruff format --check` IS gated, because formatting is auto-applied and the
# adoption PR already formatted the tree.
#
# Adopts: Factory#154 / issues #449, #452.

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ratchet-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ratchet:
    name: ratchet (ruff no-regression on changed py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can read each changed file at the base.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install pinned ruff
        run: uv tool install 'ruff==0.14.10'

      - name: Ratchet ruff strict baseline on changed backend Python
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          RUFF="uv tool run --from ruff==0.14.10 ruff"
          MERGE_BASE="$(git merge-base "$BASE_SHA" "$HEAD_SHA")"

          # Changed backend Python files that still exist at HEAD.
          mapfile -t FILES < <(git diff --name-only --diff-filter=ACMR \
            "$MERGE_BASE" "$HEAD_SHA" -- 'apps/backend/**/*.py')

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No backend Python files changed; ratchet is a no-op."
            exit 0
          fi

          # Count strict-baseline violations for a single file's content,
          # passed on stdin so we can score the BASE revision too.
          count_violations() {
            local fname="$1"
            # ruff prints one line per finding with --output-format concise;
            # count them. Empty / clean file -> 0.
            $RUFF check --config standards/ruff.toml --no-fix \
              --output-format concise --stdin-filename "$fname" - \
              2>/dev/null | grep -cE '^[^ ].*:[0-9]+:[0-9]+: ' || true
          }

          fail=0
          for f in "${FILES[@]}"; do
            head_n="$(git show "$HEAD_SHA:$f" | count_violations "$f")"
            if git cat-file -e "$MERGE_BASE:$f" 2>/dev/null; then
              base_n="$(git show "$MERGE_BASE:$f" | count_violations "$f")"
            else
              base_n=0   # new file: any violation is a regression from 0
            fi
            if [ "$head_n" -gt "$base_n" ]; then
              echo "REGRESSION  $f : $base_n -> $head_n strict violations"
              $RUFF check --config standards/ruff.toml --no-fix "$f" || true
              fail=1
            else
              echo "ok          $f : $base_n -> $head_n"
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Ratchet failed: a changed file increased its strict-baseline"
            echo "violation count. Fix the new violations (run: ruff check"
            echo "--config standards/ruff.toml --fix <file>) — see"
            echo "standards/coding-standards.md."
            exit 1
          fi

  format-check:
    name: ruff format --check (apps/backend)
    runs-on: ubuntu-latest
    # Formatting is auto-applied, never reviewed (standards section 3.6).
    # Safe to gate: `ruff format` was applied across apps/backend in the
    # adoption PR, so the tree is already format-clean.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install pinned ruff
        run: uv tool install 'ruff==0.14.10'

      - name: Ruff format check (apps/backend)
        run: uv tool run --from 'ruff==0.14.10' ruff format --check apps/backend
