name: Release

# Auto-tag + GitHub release when package.json version changes on main.
#
# Workflow:
#   1. Bump version on a feature/release branch: `node scripts/bump-version.js <version>`
#   2. Add a matching `## <version>` section to CHANGELOG.md
#   3. PR to main, merge
#   4. This workflow:
#      - Detects the version change vs the previous main commit
#      - Validates CHANGELOG.md has a `## <version>` entry
#      - Creates an annotated git tag `v<version>`
#      - Creates a GitHub release with notes extracted from CHANGELOG.md
#
# If the merge doesn't bump the version, the job exits early (no-op).

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write        # push image to GHCR
  id-token: write        # cosign keyless via GitHub OIDC
  attestations: write    # cosign attest (SBOM)

jobs:
  release:
    name: Tag + GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with parent commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: detect
        run: |
          NEW=$(jq -r '.version' package.json)
          OLD=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")

          if [ -z "$NEW" ] || [ "$NEW" = "null" ]; then
            echo "::error::package.json has no version field"
            exit 1
          fi

          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"

          if [ "$NEW" = "$OLD" ]; then
            echo "Version unchanged ($NEW) — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped: ${OLD:-<none>} -> $NEW"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate CHANGELOG entry
        if: steps.detect.outputs.should_release == 'true'
        run: |
          V="${{ steps.detect.outputs.new }}"
          ESCAPED="${V//./\\.}"
          if ! grep -qE "^## ${ESCAPED}([[:space:]]|-|$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing an entry for version $V."
            echo "::error::Add a heading matching: '## $V' or '## $V - <date>'"
            exit 1
          fi
          echo "CHANGELOG entry for $V found."

      - name: Check tag doesn't already exist
        if: steps.detect.outputs.should_release == 'true'
        run: |
          V="${{ steps.detect.outputs.new }}"
          if git ls-remote --exit-code --tags origin "v$V" >/dev/null 2>&1; then
            echo "::error::Tag v$V already exists on origin."
            echo "::error::Bump the version again or delete the tag with: git push origin :refs/tags/v$V"
            exit 1
          fi
          echo "Tag v$V is available."

      - name: Extract changelog section
        if: steps.detect.outputs.should_release == 'true'
        run: |
          V="${{ steps.detect.outputs.new }}"
          awk -v v="$V" '
            $0 ~ "^## " v "([[:space:]]|-|$)" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          # Trim leading/trailing blank lines
          sed -i -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba' -e '}' release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::Extracted release notes are empty. Check the section between '## $V' and the next '## ' heading."
            exit 1
          fi

          echo "---- release-notes.md ----"
          cat release-notes.md
          echo "--------------------------"

      - name: Create + push tag
        if: steps.detect.outputs.should_release == 'true'
        run: |
          V="${{ steps.detect.outputs.new }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$V" -m "Release v$V"
          git push origin "v$V"

      - name: Create GitHub release
        if: steps.detect.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.detect.outputs.new }}"
          gh release create "v$V" \
            --title "v$V" \
            --notes-file release-notes.md \
            --verify-tag

      # ----------------------------------------------------------------------
      # P0 supply-chain pipeline: multi-arch build → push → cosign sign +
      # SBOM attest → self-verify. Runs only on a real release (version bump).
      # ----------------------------------------------------------------------

      - name: Set up QEMU
        if: steps.detect.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        if: steps.detect.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.detect.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push bank-pilot image (WITH_RMUX=false, multi-arch)
        if: steps.detect.outputs.should_release == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tfactory:v${{ steps.detect.outputs.new }}
            ghcr.io/${{ github.repository_owner }}/tfactory:latest
          # Default WITH_RMUX=false in the Dockerfile — bank-pilot image
          # contains no rmux binary and no rmux deps.  Trivy + SBOM
          # verify this in the post-build steps below.
          provenance: mode=max
          sbom: true

      # Epic #44 R3 — second image variant bundling rmux v0.3.1.
      # Tagged ``:vX-rmux``; intended for dev/demo deployments where
      # operators opt in via Helm ``rmux.enabled=true``.  Arch-pinned
      # to amd64 because rmux upstream has no aarch64 Linux build yet
      # (tracked at https://github.com/Helvesec/rmux/issues).
      - name: Build + push dev/demo image (WITH_RMUX=true, amd64-only)
        if: steps.detect.outputs.should_release == 'true'
        id: build_rmux
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            WITH_RMUX=true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tfactory:v${{ steps.detect.outputs.new }}-rmux
            ghcr.io/${{ github.repository_owner }}/tfactory:latest-rmux
          provenance: mode=max
          sbom: true

      - name: Install cosign
        if: steps.detect.outputs.should_release == 'true'
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign both images (cosign keyless via Sigstore + GitHub OIDC)
        if: steps.detect.outputs.should_release == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/tfactory@${{ steps.build.outputs.digest }}"
          IMAGE_RMUX="ghcr.io/${{ github.repository_owner }}/tfactory@${{ steps.build_rmux.outputs.digest }}"
          cosign sign --yes "$IMAGE"
          cosign sign --yes "$IMAGE_RMUX"

      - name: Install Syft
        if: steps.detect.outputs.should_release == 'true'
        uses: anchore/sbom-action/download-syft@v0.17.8

      - name: Generate SBOMs + attest both images with cosign
        if: steps.detect.outputs.should_release == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/tfactory@${{ steps.build.outputs.digest }}"
          IMAGE_RMUX="ghcr.io/${{ github.repository_owner }}/tfactory@${{ steps.build_rmux.outputs.digest }}"
          # Bank-pilot image
          syft scan "$IMAGE" -o spdx-json=sbom.spdx.json
          syft scan "$IMAGE" -o cyclonedx-json=sbom.cyclonedx.json
          cosign attest --yes --type spdxjson    --predicate sbom.spdx.json      "$IMAGE"
          cosign attest --yes --type cyclonedx   --predicate sbom.cyclonedx.json "$IMAGE"
          # Dev/demo image (rmux variant)
          syft scan "$IMAGE_RMUX" -o spdx-json=sbom-rmux.spdx.json
          syft scan "$IMAGE_RMUX" -o cyclonedx-json=sbom-rmux.cyclonedx.json
          cosign attest --yes --type spdxjson    --predicate sbom-rmux.spdx.json      "$IMAGE_RMUX"
          cosign attest --yes --type cyclonedx   --predicate sbom-rmux.cyclonedx.json "$IMAGE_RMUX"

      - name: Verify signature (release self-test)
        if: steps.detect.outputs.should_release == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/tfactory@${{ steps.build.outputs.digest }}"
          cosign verify \
            --certificate-identity-regexp "^https://github\.com/${{ github.repository_owner }}/TFactory/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"

      - name: Upload SBOM artifacts to GitHub release
        if: steps.detect.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ steps.detect.outputs.new }}"
          gh release upload "v$V" sbom.spdx.json sbom.cyclonedx.json --clobber
