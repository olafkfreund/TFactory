name: TFactory dispatch on label

# Trigger: any issue labeled with "tfactory:run"
# Creates a TFactory test task via the web-server API so the full
# Planner → Gen-Functional → Executor → Evaluator → Triager pipeline runs.
# Part of epic #277 (C4).

on:
  issues:
    types: [labeled]

concurrency:
  group: tfactory-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    # Only act on the tfactory:run label, and only when the issue author is an
    # org/repo member (defends against drive-by labels on issues filed by
    # outside contributors triggering the privileged dispatch).
    if: >-
      github.event.label.name == 'tfactory:run' &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger TFactory test task
        # Untrusted fields (issue title/number) are passed via env, never
        # interpolated into the shell, and the JSON body is built with jq
        # --arg so a crafted title cannot break quoting or inject commands.
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          TFACTORY_URL: ${{ vars.TFACTORY_URL }}
          TFACTORY_TOKEN: ${{ secrets.TFACTORY_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -n \
            --argjson issue_number "$ISSUE_NUMBER" \
            --arg repo "$REPO" \
            --arg title "$ISSUE_TITLE" \
            '{issue_number: $issue_number, repo: $repo, title: $title}')
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${TFACTORY_URL}/api/tasks" \
            -H "Authorization: Bearer ${TFACTORY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::TFactory API returned HTTP $HTTP_STATUS"
            exit 1
          fi
          TASK_ID=$(echo "$BODY" | jq -r '.task_id // .spec_id // "unknown"')
          echo "TFactory task created: $TASK_ID"

      - name: Add tracking comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          TFACTORY_URL: ${{ vars.TFACTORY_URL }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "🏭 **TFactory test task created.** The autonomous pipeline (Planner → Gen-Functional → Executor → Evaluator → Triager) has started. Results will appear in the TFactory portal: \`${TFACTORY_URL}\`"
