# runner-images.yml — Task 7 (#23), sub-task 7.4
#
# Build all TFactory framework runner images on push to main and on PRs
# that touch any Dockerfile or this workflow file.
#
# On PRs the workflow only builds + smoke-tests each image (no publish). On
# push to main, after the smoke passes, each image is published to GHCR so the
# in-cluster lanes can pull it. The k3d cluster authenticates via its existing
# `ghcr-pull` secret.
#
# Image tags produced:
#   tfactory-runner-{pytest,jest,playwright,vitest,cypress,java,selenium,cucumber,cloud}:<commit-sha>
#   tfactory-runner-{...}:latest                      (loaded locally for the smoke test)
# Published to GHCR on main only:
#   ghcr.io/<owner>/tfactory-runner-{...}:<commit-sha>
#   ghcr.io/<owner>/tfactory-runner-{...}:latest

name: Build runner images

on:
  push:
    branches: [main]
    paths:
      - 'docker/tfactory-runner-*/**'
      - '.github/workflows/runner-images.yml'
  pull_request:
    paths:
      - 'docker/tfactory-runner-*/**'
      - '.github/workflows/runner-images.yml'

# Cancel superseded runs on the same ref (matches ci.yml convention)
concurrency:
  group: runner-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # publish runner images to GHCR (push to main only)

jobs:
  build:
    name: build ${{ matrix.runner }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # keep building remaining images if one fails
      matrix:
        runner: [pytest, jest, playwright, vitest, cypress, java, selenium, cucumber, cloud]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # docker/setup-buildx-action enables BuildKit features (layer caching,
      # multi-platform builds, --check flag). Required for dockerfile:1.7 syntax.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image and load it into the local Docker daemon so the
      # hello-world smoke step below can run it.
      # push: false — no registry configured yet (deferred task).
      # load: true  — exports image to local daemon for the smoke test.
      - name: Build tfactory-runner-${{ matrix.runner }}
        uses: docker/build-push-action@v5
        with:
          context: docker/tfactory-runner-${{ matrix.runner }}
          file: docker/tfactory-runner-${{ matrix.runner }}/Dockerfile
          push: false
          load: true
          tags: |
            tfactory-runner-${{ matrix.runner }}:${{ github.sha }}
            tfactory-runner-${{ matrix.runner }}:latest
          # GHA cache: reuse layer cache across runs scoped per framework image.
          # mode=max: cache all layers, not just the final stage.
          cache-from: type=gha,scope=runner-${{ matrix.runner }}
          cache-to: type=gha,mode=max,scope=runner-${{ matrix.runner }}

      # Hello-world smoke: verify the image runs a trivial command.
      # Each case mirrors what test_docker_runner.py tests in CI.
      - name: Hello-world smoke — ${{ matrix.runner }}
        run: |
          case "${{ matrix.runner }}" in
            pytest)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-pytest:latest \
                python -c 'print("tfactory-runner-pytest ok")'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-pytest:latest \
                pytest --version
              ;;
            jest)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-jest:latest \
                node -e 'console.log("tfactory-runner-jest ok")'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-jest:latest \
                jest --version
              ;;
            playwright)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=256m \
                tfactory-runner-playwright:latest \
                node -e 'console.log("tfactory-runner-playwright ok")'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=256m \
                tfactory-runner-playwright:latest \
                npx playwright --version
              ;;
            selenium)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=128m \
                tfactory-runner-selenium:latest \
                python -c 'import selenium; print("tfactory-runner-selenium ok", selenium.__version__)'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=128m \
                tfactory-runner-selenium:latest \
                chromedriver --version
              ;;
            cucumber)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=256m \
                tfactory-runner-cucumber:latest \
                node -e 'console.log("tfactory-runner-cucumber ok")'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=256m \
                tfactory-runner-cucumber:latest \
                npx cucumber-js --version
              ;;
            vitest)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-vitest:latest \
                node -e 'console.log("tfactory-runner-vitest ok")'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-vitest:latest \
                vitest --version
              ;;
            cypress)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=256m \
                tfactory-runner-cypress:latest \
                node -e 'console.log("tfactory-runner-cypress ok")'
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=256m \
                tfactory-runner-cypress:latest \
                cypress --version
              ;;
            java)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-java:latest \
                java -version
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-java:latest \
                mvn --version
              ;;
            cloud)
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-cloud:latest \
                prowler --version
              docker run --rm \
                --network=none \
                --read-only \
                --tmpfs /tmp:rw,size=64m \
                tfactory-runner-cloud:latest \
                checkov --version
              ;;
          esac

      # Publish to GHCR — only on push to main, and only after the smoke above
      # passed (a broken image never reaches the registry). PRs (incl. forks)
      # skip these steps, so they stay build-and-smoke only.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-run the build to push: every layer is already in the GHA cache from
      # the build step above, so this is effectively just a registry upload.
      - name: Push tfactory-runner-${{ matrix.runner }} to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: docker/tfactory-runner-${{ matrix.runner }}
          file: docker/tfactory-runner-${{ matrix.runner }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tfactory-runner-${{ matrix.runner }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tfactory-runner-${{ matrix.runner }}:latest
          cache-from: type=gha,scope=runner-${{ matrix.runner }}
          cache-to: type=gha,mode=max,scope=runner-${{ matrix.runner }}
