# nix-runner-image.yml — RFC-0005 Tier A execution substrate.
#
# Builds AND PUSHES the thin Nix base image used by the k8s Job-per-task runner
# to ghcr, so the live cluster can pull it. Separate from runner-images.yml
# (which is build-only / push-deferred) because this image must actually be
# pullable by the Jobs TFactory dispatches.
#
# Tags: ghcr.io/<owner>/tfactory-runner-nix:{<sha>,latest}

name: Build + push nix runner image

on:
  push:
    branches: [main]
    paths:
      - 'docker/tfactory-runner-nix/**'
      - '.github/workflows/nix-runner-image.yml'
  pull_request:
    paths:
      - 'docker/tfactory-runner-nix/**'
      - '.github/workflows/nix-runner-image.yml'

concurrency:
  group: nix-runner-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: "ghcr.io/${{ github.repository_owner }}/tfactory-runner-nix"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: tags
        run: echo "sha=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # Same GHCR auth pattern as deploy.yml: prefer a write:packages PAT
      # (GHCR_PAT), fall back to the repo-scoped GITHUB_TOKEN.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}"

      # On PRs: build + load + smoke only (no push). On push to main: push.
      - uses: docker/build-push-action@v6
        with:
          context: docker/tfactory-runner-nix
          file: docker/tfactory-runner-nix/Dockerfile
          platforms: linux/amd64
          push: "${{ github.event_name == 'push' }}"
          load: "${{ github.event_name == 'pull_request' }}"
          tags: |
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=nix-runner
          cache-to: type=gha,mode=max,scope=nix-runner

      # Smoke (PR only — image is loaded locally): nix + flakes work.
      - name: Nix smoke
        if: "${{ github.event_name == 'pull_request' }}"
        run: |
          docker run --rm "${{ env.IMAGE }}:latest" \
            nix --version
          docker run --rm "${{ env.IMAGE }}:latest" \
            sh -c 'nix flake --help >/dev/null && echo "flakes ok"'
