      title: Remote MCP server guide
      icon: docs
    - url: https://github.com/olafkfreund/TFactory/blob/main/guides/CLAUDE_CODE_MCP_TOOLS.md
      title: Claude Code MCP tools guide
      icon: docs
  tags:
    - python
    - mcp
    - json-rpc
spec:
  type: service
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  providesApis:
    - tfactory-mcp
