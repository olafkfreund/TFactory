apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: tfactory-workspace
  title: TFactory workspace store
  description: >-
    Per-task filesystem state at ~/.tfactory/workspaces/<project>/specs/<spec>/
    (override with TFACTORY_WORKSPACE_ROOT). Holds status.json, test_plan.json,
    context/, tests/, findings/ and logs/ for every run.
  annotations:
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/backend/workspaces/
    backstage.io/view-url: https://github.com/olafkfreund/TFactory/tree/main/apps/backend/workspaces
    backstage.io/edit-url: https://github.com/olafkfreund/TFactory/edit/main/catalog-info.yaml
  tags:
    - filesystem
    - state-store
spec:
  type: filesystem
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
