# Backstage Software Catalog descriptor for TFactory.
#
# Import into Backstage via the catalog "Register an existing component" flow,
# pointing at the raw URL of this file, e.g.:
#   https://github.com/olafkfreund/TFactory/blob/main/catalog-info.yaml
#
# This file declares the platform (Domain + System), its Components, the APIs
# they provide/consume, and a backing Resource. TechDocs for the whole platform
# is attached to the System (built from the repo-root mkdocs.yml + techdocs/).
#
# Entity model:
#   Domain  factory-platform
#     System  tfactory
#       Component  tfactory-web-server   -> provides web-api, mcp-stdio
#       Component  tfactory-frontend-web -> consumes web-api
#       Component  tfactory-backend      -> the 4-agent pipeline + CLI
#       Component  tfactory-mcp-server   -> provides mcp
#       API        tfactory-web-api        (openapi)
#       API        tfactory-mcp            (mcp / json-rpc)
#       API        tfactory-completion-event (asyncapi)
#       Resource   tfactory-workspace      (filesystem state store)
---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: factory-platform
  title: Factory Platform (PARR spine)
  description: >-
    The DataSeek autonomous SDLC spine — AIFactory (build), TFactory (test),
    PFactory (provision) and CFactory (coordinate) — connected by a normalized
    completion-event envelope. This descriptor covers TFactory.
  tags:
    - autonomous-sdlc
    - ai-agents
spec:
  owner: group:default/dataseek-team
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: tfactory
  title: TFactory
  description: >-
    Autonomous test-generation + execution platform. Takes a finished feature on
    a branch, generates tests aligned to the acceptance criteria, runs them in a
    Docker sandbox, scores them with a 5-signal verdict pipeline (coverage delta ·
    3x stability · mutate-and-check · flake-lint promotion · LLM semantic
    relevance) and emits a ranked triage report ready to commit + post to the PR.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: olafkfreund/TFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/
  links:
    - url: https://github.com/olafkfreund/TFactory
      title: Source repository
      icon: github
    - url: https://github.com/olafkfreund/TFactory/issues/33
      title: Active epic (#33)
      icon: dashboard
  tags:
    - testing
    - ai-agents
    - python
    - fastapi
    - react
spec:
  owner: group:default/dataseek-team
  domain: factory-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tfactory-web-server
  title: TFactory Web API server
  description: >-
    FastAPI backend (REST + WebSocket) for the TFactory web UI and the
    HTTP/SSE + stdio MCP proxies. ~300 routes across auth, projects, tasks,
    execution, files, terminal, cloud assessment, credentials and settings.
  annotations:
    github.com/project-slug: olafkfreund/TFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/web-server/
  tags:
    - python
    - fastapi
    - websocket
spec:
  type: service
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  providesApis:
    - tfactory-web-api
    - tfactory-mcp
  dependsOn:
    - resource:default/tfactory-workspace
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tfactory-frontend-web
  title: TFactory web frontend
  description: >-
    Browser-based React 19 + TypeScript + Vite portal. Real-time task progress
    over WebSocket, Monaco editor, xterm terminal, Mermaid diagrams, i18n.
  annotations:
    github.com/project-slug: olafkfreund/TFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/frontend-web/
  tags:
    - react
    - typescript
    - vite
spec:
  type: website
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  consumesApis:
    - tfactory-web-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tfactory-backend
  title: TFactory pipeline & CLI
  description: >-
    The 4-agent test pipeline (Planner -> Gen-Functional -> Executor -> Evaluator
    -> Triager) plus the Python CLI, provider abstraction and Graphiti memory.
    Each stage auto-fires the next; the Triager emits the completion-event.
  annotations:
    github.com/project-slug: olafkfreund/TFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/backend/
  tags:
    - python
    - ai-agents
    - claude-agent-sdk
spec:
  type: service
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  providesApis:
    - tfactory-completion-event
  dependsOn:
    - resource:default/tfactory-workspace
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tfactory-mcp-server
  title: TFactory MCP server
  description: >-
    Stdio JSON-RPC MCP server exposing task-control tools (task_create_and_run,
    task_status, task_list, report_get, task_rerun, project_list, project_create)
    so external agents (Claude Code, Cursor) can drive TFactory.
  annotations:
    github.com/project-slug: olafkfreund/TFactory
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/backend/mcp_server/
  tags:
    - python
    - mcp
spec:
  type: service
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  providesApis:
    - tfactory-mcp
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: tfactory-web-api
  title: TFactory Web API
  description: >-
    REST API for TFactory — self-hosted AI task management + agent orchestration.
    OpenAPI 3.x generated from the FastAPI app (v0.5.0, ~300 paths). Swagger UI at
    /docs and ReDoc at /redoc when APP_DEBUG=true. Bearer (JWT) auth.
  annotations:
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/web-server/
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  definition:
    $text: ./techdocs/specs/tfactory-web-api.openapi.json
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: tfactory-mcp
  title: TFactory MCP (Model Context Protocol)
  description: >-
    JSON-RPC 2.0 tool surface exposed over stdio (and optionally HTTP/SSE) so
    agents can create, run, inspect and re-run TFactory tasks and fetch triage
    reports. Server name "tfactory", version 1.0.0.
  annotations:
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/apps/backend/mcp_server/tfactory_server.py
  tags:
    - mcp
    - json-rpc
spec:
  type: mcp
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  definition:
    $text: ./techdocs/specs/tfactory-mcp.md
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: tfactory-completion-event
  title: TFactory completion-event envelope
  description: >-
    Normalized v1 completion-event envelope the Triager emits on terminal status
    (webhook POST and/or findings/COMPLETED.json sentinel). The cross-service
    shape of the Factory PARR spine — correlation_id is the GitHub issue number.
  annotations:
    backstage.io/source-location: url:https://github.com/olafkfreund/TFactory/tree/main/docs/completion-event-envelope.md
  tags:
    - asyncapi
    - events
    - webhook
spec:
  type: asyncapi
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
  definition:
    $text: ./techdocs/specs/tfactory-completion-event.asyncapi.yaml
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: tfactory-workspace
  title: TFactory workspace store
  description: >-
    Per-task filesystem state at ~/.tfactory/workspaces/<project>/specs/<spec>/
    (override with TFACTORY_WORKSPACE_ROOT). Holds status.json, test_plan.json,
    context/, tests/, findings/ and logs/ for every run.
spec:
  type: filesystem
  lifecycle: production
  owner: group:default/dataseek-team
  system: tfactory
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: dataseek-team
  description: DataSeek Team — maintainers of TFactory.
spec:
  type: team
  children: []
