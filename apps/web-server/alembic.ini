# Alembic configuration for TFactory's web-server (P1.3 of Epic #26).
#
# The sqlalchemy.url below is a SQLite fallback used only when
# DATABASE_URL is not set in the environment. env.py overrides this
# from the DATABASE_URL env var when present (which is the case in
# CI and production).

[alembic]
script_location = server/database/alembic
sqlalchemy.url = sqlite+aiosqlite:///./tfactory-fallback.db

# Filename template — sortable + descriptive.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Compare type and server defaults on autogenerate.
compare_type = true
compare_server_default = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
