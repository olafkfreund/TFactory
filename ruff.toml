# Ruff configuration for MagesticAI

# Vendored verification-core copies (Factory#158): these files are byte-exact
# mirrors of the Factory hub canonical (scripts/) and are governed by the
# byte-exact drift gate (verification-core-drift workflow), NOT this repo's style
# bar. Reformatting them under the local config (default line-length 88) would
# make them diverge from the hub canonical (formatted at line-length 100) and
# break the drift gate. Excluded from format/lint here for the same reason the
# Factory hub excludes its shared/factory-github vendored mirror.
extend-exclude = [
    "apps/backend/agents/verification_gate.py",
    "apps/backend/tools/runners/nix_provisioner.py",
    "apps/backend/tools/runners/artifact_store.py",
]

[lint]
# Enable common rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]

ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument
    "B904",   # raise from err (too many to fix now)
    "B905",   # zip without strict parameter
    "C401",   # unnecessary generator
    "C416",   # unnecessary list comprehension
    "E402",   # module level import not at top of file
    "F841",   # local variable assigned but never used
    "W293",   # blank line contains whitespace
    "B007",   # loop control variable not used
    "F821",   # undefined name (forward refs in type hints used as strings)
    "UP035",  # deprecated typing imports (legacy modules use typing.List/Dict)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # unused imports in __init__.py
"tests/*" = [
    "B011",   # assert false in tests
    "B017",   # assert raises bare Exception (acceptable in tests)
    "E712",   # == True/False (occasionally clearer in test assertions)
    "E722",   # bare except (acceptable in test cleanup)
    "F401",   # unused imports (availability checks)
    "F811",   # redefined-while-unused (pytest fixture argument shadowing)
]
"test_*.py" = ["F401", "F811"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
